<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 | 후제공방</title>
  <link rel="icon" href="/favicon.png" type="image/png">
  <style>
    body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #030712; font-family: 'Pretendard', -apple-system, sans-serif; }
    .box { text-align: center; color: #e5e7eb; padding: 24px; }
    .code { font-size: 72px; font-weight: 900; color: #8788EE; text-shadow: 0 0 30px rgba(135, 136, 238, 0.4); margin: 0; }
    .msg { font-size: 16px; font-weight: 700; margin: 12px 0 28px; color: #9ca3af; }
    a { display: inline-block; padding: 12px 28px; background: rgba(135, 136, 238, 0.15); border: 1px solid rgba(135, 136, 238, 0.5); border-radius: 12px; color: #c7c8f5; font-weight: 900; text-decoration: none; font-size: 14px; transition: background 0.2s; }
    a:hover { background: rgba(135, 136, 238, 0.3); }
  </style>
</head>
<body>
  <div class="box">
    <p class="code">404</p>
    <p class="msg">페이지를 찾을 수 없습니다.</p>
    <a href="/">후제공방 메인으로</a>
  </div>
</body>
</html>
